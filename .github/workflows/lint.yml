name: Run ESLint Linter

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  lint:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.18.3'
        cache: 'npm'
    - name: Install npm
      run: npm install npm@10.8.2 -g
    - name: Install dependencies
      run: npm ci
    - name: Run lint 
      run: npm run lint --if-present